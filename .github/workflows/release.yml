name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev libasound2-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav

      - name: install gstreamer (macos only)
        if: matrix.platform == 'macos-latest'
        run: brew install gstreamer

      - name: Install Windows Dependencies
        if: matrix.platform == 'windows-latest'
        run: |
          # Injecting custom mirror link to bypass 418 Teapot error
          $installerUrl = "https://github.com/nishal21/NekoBeat/releases/download/build-deps/gstreamer-1.0-msvc-x86_64-1.28.1.exe"
          
          echo "Downloading GStreamer from custom mirror..."
          Invoke-WebRequest -Uri $installerUrl -OutFile "gstreamer.exe"
          
          echo "Installing GStreamer (Unified EXE)..."
          Start-Process -FilePath ".\gstreamer.exe" -ArgumentList "/quiet /norestart" -Wait
          
          echo "Adding GStreamer to PATH..."
          "C:\gstreamer\1.0\msvc_x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding ASCII -Append
          "C:\gstreamer\1.0\msvc_x86_64\lib" | Out-File -FilePath $env:GITHUB_PATH -Encoding ASCII -Append
          
          echo "Installing pkg-config..."
          choco install pkgconfiglite --confirm
          
          echo "Setting PKG_CONFIG_PATH for Rust..."
          "PKG_CONFIG_PATH=/gstreamer/1.0/msvc_x86_64/lib/pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

      - name: install frontend dependencies
        run: npm install

      - name: Grant Execute Permissions to Sidecars
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/binaries/*

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NekoBeat ${{ github.ref_name }}'
          releaseBody: 'See the assets below for the latest NekoBeat binaries.'
          releaseDraft: true
          prerelease: false

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm install
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
        
      - name: THE SILVER BULLET - Expose NDK C-Compilers to Rust
        run: echo "$ANDROID_HOME/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
          
      - name: Install System Dependencies for Android
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav
          
      - name: Tauri Android Init and Permissions Inject
        run: |
          npm run tauri android init
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />' src-tauri/gen/android/app/src/main/AndroidManifest.xml
          
      - name: Create Dummy Android Sidecar
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/spotiflac-cli-aarch64-linux-android
          
      - name: Build APK
        run: npm run tauri android build -- --apk
        
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
