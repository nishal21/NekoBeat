name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev libasound2-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav

      - name: install gstreamer (macos only)
        if: matrix.platform == 'macos-latest'
        run: brew install gstreamer

      - name: install gstreamer (windows only)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $gstreamerVersion = "1.24.13"
          $runtimeUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$gstreamerVersion/msvc/gstreamer-1.0-msvc-x86_64-$gstreamerVersion.msi"
          $develUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$gstreamerVersion/msvc/gstreamer-1.0-devel-msvc-x86_64-$gstreamerVersion.msi"
          
          echo "Downloading GStreamer Runtime..."
          curl.exe -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o gstreamer-runtime.msi $runtimeUrl
          
          echo "Downloading GStreamer Devel..."
          curl.exe -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o gstreamer-devel.msi $develUrl
          
          echo "Installing packages..."
          Start-Process msiexec.exe -Wait -ArgumentList '/i gstreamer-runtime.msi /quiet /qn /norestart'
          Start-Process msiexec.exe -Wait -ArgumentList '/i gstreamer-devel.msi /quiet /qn /norestart'
          
          echo "Adding GStreamer to PATH..."
          "C:\gstreamer\1.0\msvc_x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding ASCII -Append
          "C:\gstreamer\1.0\msvc_x86_64\lib" | Out-File -FilePath $env:GITHUB_PATH -Encoding ASCII -Append
          
          echo "Installing pkg-config..."
          choco install pkgconfiglite --confirm
          
          echo "Setting PKG_CONFIG_PATH for Rust..."
          "PKG_CONFIG_PATH=C:\gstreamer\1.0\msvc_x86_64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NekoBeat ${{ github.ref_name }}'
          releaseBody: 'See the assets below for the latest NekoBeat binaries.'
          releaseDraft: true
          prerelease: false

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install rust and android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: install ndk
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install System Dependencies for Android
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav

      - name: install frontend dependencies
        run: npm install

      - name: init android template
        run: npm run tauri android init

      - name: inject background permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />' src-tauri/gen/android/app/src/main/AndroidManifest.xml

      - name: build android apk
        run: npm run tauri android build -- --apk

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
